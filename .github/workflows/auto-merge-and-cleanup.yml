name: Weekly Auto-Merge and Branch Cleanup

on:
  schedule:
    # Every Friday at 22:00 KST (13:00 UTC)
    - cron: "0 13 * * 5"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  auto_merge_and_cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Merge all open PRs and delete merged branches
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const { data: repoInfo } = await github.rest.repos.get({ owner, repo });
            const defaultBranch = repoInfo.default_branch;

            const pulls = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: "open",
              per_page: 100,
            });

            core.info(`Found ${pulls.length} open PR(s).`);

            for (const pr of pulls) {
              if (pr.draft) {
                core.info(`#${pr.number} is a draft. Skipping.`);
                continue;
              }

              try {
                await github.rest.pulls.merge({
                  owner,
                  repo,
                  pull_number: pr.number,
                  merge_method: "merge",
                });
                core.info(`#${pr.number} merged.`);
              } catch (err) {
                core.warning(`#${pr.number} merge failed: ${err.message}`);
                continue;
              }

              // Delete branch if it is in the same repo and not the default branch
              if (pr.head.repo && pr.head.repo.full_name === `${owner}/${repo}`) {
                const branch = pr.head.ref;
                if (branch !== defaultBranch) {
                  try {
                    await github.rest.git.deleteRef({
                      owner,
                      repo,
                      ref: `heads/${branch}`,
                    });
                    core.info(`Deleted branch: ${branch}`);
                  } catch (err) {
                    core.warning(`Failed to delete branch ${branch}: ${err.message}`);
                  }
                } else {
                  core.info(`Branch ${branch} is default branch. Skipping delete.`);
                }
              } else {
                core.info(`#${pr.number} is from a fork. Skipping delete.`);
              }
            }
